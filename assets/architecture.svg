<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="560" viewBox="0 0 1080 560" font-family="Arial, Helvetica, sans-serif">
  <!-- Background -->
  <rect x="0" y="0" width="1080" height="560" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="40" y="46" font-size="24" font-weight="bold" fill="#1D2D3E">Predictive JIT Supply Chain Risk — Reference Architecture</text>
  <text x="40" y="72" font-size="14" fill="#5B738B">BestRun Technologies · SAP Business Technology Platform</text>

  <!-- BTP platform band -->
  <rect x="40" y="100" width="1000" height="400" rx="10" fill="#F5F6F7" stroke="#D9D9D9" stroke-width="1.5"/>
  <rect x="40" y="100" width="1000" height="34" rx="10" fill="#0A6ED1"/>
  <rect x="40" y="118" width="1000" height="16" fill="#0A6ED1"/>
  <text x="60" y="123" font-size="14" font-weight="bold" fill="#FFFFFF">SAP Business Technology Platform</text>

  <!-- Column 1: Data Sources -->
  <text x="70" y="172" font-size="13" font-weight="bold" fill="#5B738B" letter-spacing="1">DATA</text>
  <rect x="70" y="185" width="200" height="90" rx="8" fill="#FFFFFF" stroke="#0A6ED1" stroke-width="2"/>
  <text x="170" y="222" font-size="15" font-weight="bold" fill="#1D2D3E" text-anchor="middle">SAP S/4HANA</text>
  <text x="170" y="246" font-size="12" fill="#5B738B" text-anchor="middle">Historical PO data</text>
  <text x="170" y="263" font-size="12" fill="#5B738B" text-anchor="middle">Supplier performance</text>

  <rect x="70" y="295" width="200" height="70" rx="8" fill="#FFFFFF" stroke="#8C9BAB" stroke-width="1.5"/>
  <text x="170" y="326" font-size="14" font-weight="bold" fill="#1D2D3E" text-anchor="middle">Integration Suite</text>
  <text x="170" y="347" font-size="12" fill="#5B738B" text-anchor="middle">Secure data connectivity</text>

  <!-- Column 2: Prediction -->
  <text x="330" y="172" font-size="13" font-weight="bold" fill="#5B738B" letter-spacing="1">PREDICT</text>
  <rect x="330" y="185" width="220" height="90" rx="8" fill="#EAF3FB" stroke="#0A6ED1" stroke-width="2"/>
  <text x="440" y="217" font-size="15" font-weight="bold" fill="#0A6ED1" text-anchor="middle">SAP AI Core</text>
  <text x="440" y="240" font-size="13" font-weight="bold" fill="#1D2D3E" text-anchor="middle">SAP-RPT-1</text>
  <text x="440" y="260" font-size="12" fill="#5B738B" text-anchor="middle">Tabular delay prediction</text>

  <!-- Risk tiers -->
  <rect x="330" y="295" width="220" height="70" rx="8" fill="#FFFFFF" stroke="#8C9BAB" stroke-width="1.5"/>
  <text x="440" y="320" font-size="14" font-weight="bold" fill="#1D2D3E" text-anchor="middle">Risk Classification</text>
  <circle cx="378" cy="345" r="8" fill="#30914C"/>
  <circle cx="440" cy="345" r="8" fill="#E76500"/>
  <circle cx="502" cy="345" r="8" fill="#BB0000"/>
  <text x="378" y="365" font-size="11" fill="#5B738B" text-anchor="middle">Green</text>
  <text x="440" y="365" font-size="11" fill="#5B738B" text-anchor="middle">Amber</text>
  <text x="502" y="365" font-size="11" fill="#5B738B" text-anchor="middle">Red</text>

  <!-- Column 3: Act -->
  <text x="610" y="172" font-size="13" font-weight="bold" fill="#5B738B" letter-spacing="1">ACT</text>
  <rect x="610" y="185" width="220" height="90" rx="8" fill="#EAF3FB" stroke="#0A6ED1" stroke-width="2"/>
  <text x="720" y="212" font-size="15" font-weight="bold" fill="#0A6ED1" text-anchor="middle">Gen AI Hub</text>
  <text x="720" y="234" font-size="13" font-weight="bold" fill="#1D2D3E" text-anchor="middle">ReAct Agent</text>
  <text x="720" y="254" font-size="12" fill="#5B738B" text-anchor="middle">Reason + Act loop</text>
  <text x="720" y="270" font-size="12" fill="#5B738B" text-anchor="middle">LLM orchestration</text>

  <rect x="610" y="295" width="220" height="70" rx="8" fill="#FFFFFF" stroke="#8C9BAB" stroke-width="1.5"/>
  <text x="720" y="326" font-size="14" font-weight="bold" fill="#1D2D3E" text-anchor="middle">Mitigation Tools</text>
  <text x="720" y="347" font-size="12" fill="#5B738B" text-anchor="middle">Alt-supplier lookup · capacity</text>

  <!-- Column 4: Govern -->
  <text x="890" y="172" font-size="13" font-weight="bold" fill="#5B738B" letter-spacing="1">GOVERN</text>
  <rect x="890" y="185" width="130" height="180" rx="8" fill="#FFFFFF" stroke="#30914C" stroke-width="2"/>
  <text x="955" y="255" font-size="14" font-weight="bold" fill="#1D2D3E" text-anchor="middle">Human-in-</text>
  <text x="955" y="274" font-size="14" font-weight="bold" fill="#1D2D3E" text-anchor="middle">the-Loop</text>
  <text x="955" y="298" font-size="12" fill="#5B738B" text-anchor="middle">Approval</text>
  <text x="955" y="314" font-size="12" fill="#5B738B" text-anchor="middle">gate</text>

  <!-- Flow arrows -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#354A5F"/>
    </marker>
  </defs>
  <line x1="270" y1="230" x2="326" y2="230" stroke="#354A5F" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="550" y1="230" x2="606" y2="230" stroke="#354A5F" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="830" y1="255" x2="886" y2="255" stroke="#354A5F" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Caption strip -->
  <text x="40" y="540" font-size="12" fill="#5B738B">Flow: Dark data → foundation-model prediction → policy-based risk tiers → agentic mitigation → human approval</text>
</svg>
